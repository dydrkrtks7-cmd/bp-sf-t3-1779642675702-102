<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="543" cy="714" r="37" fill="#1565c0" opacity="0.09"/>
    <circle cx="1034" cy="33" r="77" fill="#1565c0" opacity="0.12"/>
    <circle cx="1267" cy="614" r="69" fill="#1565c0" opacity="0.14"/>
    <circle cx="753" cy="98" r="92" fill="#1565c0" opacity="0.09"/>
    <circle cx="82" cy="636" r="77" fill="#1565c0" opacity="0.07"/>
    <circle cx="1259" cy="522" r="83" fill="#1565c0" opacity="0.12"/>
    <rect x="497" y="619" width="61" height="99" rx="8" fill="#0d47a1" opacity="0.12" transform="rotate(29, 1101, 401)"/>
    <rect x="-36" y="-83" width="34" height="31" rx="8" fill="#0d47a1" opacity="0.11" transform="rotate(34, 607, -88)"/>
    <rect x="69" y="687" width="61" height="28" rx="8" fill="#0d47a1" opacity="0.06" transform="rotate(30, -51, 456)"/>
    <rect x="1089" y="599" width="73" height="48" rx="8" fill="#0d47a1" opacity="0.05" transform="rotate(21, 464, 186)"/>
    <rect x="1060" y="401" width="81" height="21" rx="8" fill="#0d47a1" opacity="0.06" transform="rotate(15, 1026, 228)"/>
    <rect x="1021" y="565" width="64" height="35" rx="8" fill="#0d47a1" opacity="0.04" transform="rotate(20, 111, 331)"/>
    <rect x="773" y="-73" width="91" height="95" rx="8" fill="#0d47a1" opacity="0.03" transform="rotate(20, -11, 708)"/>
    <rect x="-59" y="161" width="78" height="44" rx="8" fill="#0d47a1" opacity="0.15" transform="rotate(2, 135, 276)"/>
    <polygon points="-60,493 18,649 -138,649" fill="#1565c0" opacity="0.08"/>
    <polygon points="1188,-163 1275,11 1101,11" fill="#1565c0" opacity="0.11"/>
    <polygon points="449,524 531,688 367,688" fill="#1565c0" opacity="0.11"/>
    <polygon points="652,576 714,700 590,700" fill="#1565c0" opacity="0.11"/>

  <!-- Wave at bottom -->
  <path d="M0,590 C360,610 840,570 1200,590 L1200,630 L0,630Z" fill="#1565c0" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    강남 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 주식투자
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 강남 셔츠룸 — 주식투자
  </text>
</svg>